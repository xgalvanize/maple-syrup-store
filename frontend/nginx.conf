server {
  listen 80;
  server_name _;

  # Keep React admin route (/admin) in SPA, but block Django admin URLs
  location = /admin {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files /index.html =404;
  }

  location ^~ /admin/ {
    return 404;
  }

  location /api/ {
    proxy_pass http://backend.default.svc.cluster.local:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_pass_request_headers on;
  }

  location /graphql/ {
    proxy_pass http://backend.default.svc.cluster.local:8000;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_pass_request_headers on;
    
    if ($request_method = 'OPTIONS') {
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
      add_header 'Content-Length' '0' always;
      return 204;
    }
  }

  # Block Django admin static files from public frontend domain
  location ~ ^/static/admin/ {
    return 404;
  }

  # React build static files
  location /static/ {
    # Root path to React build's static dir
    root /usr/share/nginx/html;
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  # React frontend (last)
  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri /index.html;
  }
}

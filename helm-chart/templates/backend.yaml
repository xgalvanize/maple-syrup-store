apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maple-syrup-store.fullname" . }}-backend
  labels:
    {{- include "maple-syrup-store.labels" . | nindent 4 }}
    app: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "maple-syrup-store.selectorLabels" . | nindent 6 }}
      app: backend
  template:
    metadata:
      labels:
        {{- include "maple-syrup-store.selectorLabels" . | nindent 8 }}
        app: backend
    spec:
      {{- if .Values.securityContext.enabled }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        {{- if .Values.securityContext.enabled }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        {{- end }}
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /api/health/
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health/
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        env:
        {{- range $key, $value := .Values.backend.env }}
        - name: {{ $key }}
          value: "{{ $value }}"
        {{- end }}
        {{- range $key, $value := .Values.backend.secrets }}
        - name: {{ $key }}
          value: "{{ $value }}"
        {{- end }}
        {{- if .Values.django.superuser }}
        {{- if .Values.django.superuser.username }}
        - name: DJANGO_SUPERUSER_USERNAME
          value: "{{ .Values.django.superuser.username }}"
        {{- end }}
        {{- if .Values.django.superuser.email }}
        - name: DJANGO_SUPERUSER_EMAIL
          value: "{{ .Values.django.superuser.email }}"
        {{- end }}
        {{- if .Values.django.superuser.password }}
        - name: DJANGO_SUPERUSER_PASSWORD
          value: "{{ .Values.django.superuser.password }}"
        {{- end }}
        {{- end }}
        resources:
          {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    {{- include "maple-syrup-store.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.backend.type }}
  ports:
  - port: 8000
    targetPort: 8000
    {{- if .Values.service.backend.nodePort }}
    nodePort: {{ .Values.service.backend.nodePort }}
    {{- end }}
  selector:
    {{- include "maple-syrup-store.selectorLabels" . | nindent 4 }}
    app: backend

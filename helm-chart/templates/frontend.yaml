{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "maple-syrup-store.fullname" . }}-frontend-nginx
  labels:
    {{- include "maple-syrup-store.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      # Keep React admin route (/admin) in SPA, but block Django admin URLs
      location = /admin {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files /index.html =404;
      }

      location ^~ /admin/ {
        return 404;
      }

      location /api/ {
        proxy_pass http://backend.default.svc.cluster.local:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
      }

      location /graphql/ {
        proxy_pass http://backend.default.svc.cluster.local:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;

        if ($request_method = 'OPTIONS') {
          add_header 'Access-Control-Allow-Origin' '*' always;
          add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
          add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
          add_header 'Content-Length' '0' always;
          return 204;
        }
      }

      # Block Django admin static files from public frontend domain
      location ~ ^/static/admin/ {
        return 404;
      }

      # React build static files
      location /static/ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
      }

      # React frontend (last)
      location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri /index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maple-syrup-store.fullname" . }}-frontend
  labels:
    {{- include "maple-syrup-store.labels" . | nindent 4 }}
    app: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "maple-syrup-store.selectorLabels" . | nindent 6 }}
      app: frontend
  template:
    metadata:
      labels:
        {{- include "maple-syrup-store.selectorLabels" . | nindent 8 }}
        app: frontend
    spec:
      volumes:
      - name: frontend-nginx-config
        configMap:
          name: {{ include "maple-syrup-store.fullname" . }}-frontend-nginx
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - containerPort: 80
        volumeMounts:
        - name: frontend-nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        resources:
          {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    {{- include "maple-syrup-store.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.frontend.type }}
  ports:
  - port: 80
    targetPort: 80
    {{- if and (eq .Values.service.frontend.type "NodePort") .Values.service.frontend.nodePort }}
    nodePort: {{ .Values.service.frontend.nodePort }}
    {{- end }}
  selector:
    {{- include "maple-syrup-store.selectorLabels" . | nindent 4 }}
    app: frontend
{{- end }}
